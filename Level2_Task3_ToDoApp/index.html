<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasko — Mission Scroll</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="bg-scene">
    <img src="https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1600&auto=format&fit=crop" class="bg-img" alt=""/>
    <div class="bg-overlay"></div>
    <div id="petals"></div>
  </div>

  <div class="torch torch-l"></div>
  <div class="torch torch-r"></div>

  <main>

    <header>
      <div class="brand">
        <div class="brand-crest">✦</div>
        <div>
          <h1>Tasko</h1>
          <span class="tagline">Mission Scroll</span>
        </div>
      </div>
      <div id="rank-badge" class="rank-badge">
        <span id="rank-label">Rank: Mizunoto</span>
      </div>
    </header>

    <div class="card">

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-top">
          <span id="progress-label">Awaiting orders...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="track">
          <div class="fill" id="fill"></div>
        </div>
        <div class="breathing-text" id="breathing-text">Total Concentration</div>
      </div>

      <div class="divider"><span></span><span class="div-icon">⚔</span><span></span></div>

      <!-- Input -->
      <div class="input-section">
        <div class="input-row">
          <div class="input-wrap">
            <span class="sword-icon">⚔</span>
            <input type="text" id="input-box" placeholder="Name your mission..." autocomplete="off" spellcheck="false"/>
          </div>
          <button id="add-btn" onclick="addTask()">Carve It</button>
        </div>
        <div class="meta-row">
          <div class="p-group">
            <span class="meta-label">Urgency</span>
            <div class="p-pills">
              <button class="p-pill" data-p="high">🔴 Critical</button>
              <button class="p-pill active" data-p="medium">🟡 Standard</button>
              <button class="p-pill" data-p="low">🟢 Patrol</button>
            </div>
          </div>
          <div class="d-group">
            <span class="meta-label">Deadline</span>
            <input type="date" id="due-date"/>
          </div>
        </div>
      </div>

      <div class="divider"><span></span><span class="div-icon">✦</span><span></span></div>

      <!-- Filters -->
      <div class="filters">
        <button class="ftab on" data-f="all">All</button>
        <button class="ftab" data-f="active">Active</button>
        <button class="ftab" data-f="done">Done</button>
        <button class="ftab danger" id="clear-btn">Clear Done</button>
      </div>

      <!-- List -->
      <ul id="list"></ul>

      <!-- Empty -->
      <div class="empty" id="empty">
        <div class="empty-icon">✦</div>
        <p>The scroll is empty</p>
        <span>Carve your first mission above</span>
      </div>

    </div>

    <footer>Breath of Water &nbsp;·&nbsp; Total Concentration</footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
