<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasko — Mission Scroll</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold:#FFD700; --gold2:#FFF176; --orange:#FF6F00; --red:#FF1744;
      --crimson:#D50000; --purple:#AA00FF; --cyan:#00E5FF; --green:#00E676;
      --bg1:#0D0005; --text:#FFF8E1; --muted:rgba(255,248,225,0.6);
      --ease:cubic-bezier(0.4,0,0.2,1);
    }
    html { scroll-behavior:smooth; }
    body { font-family:'Inter',sans-serif; background:var(--bg1); color:var(--text); min-height:100vh; overflow-x:hidden; }

    .bg-scene {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,111,0,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(170,0,255,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 90%, rgba(213,0,0,0.2) 0%, transparent 50%),
        linear-gradient(160deg,#0D0005 0%,#1A0010 40%,#0A0015 100%);
    }
    .grid-lines {
      position:fixed; inset:0; z-index:0;
      background-image:linear-gradient(rgba(255,215,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.04) 1px,transparent 1px);
      background-size:60px 60px;
    }
    #petals { position:fixed; inset:0; z-index:1; pointer-events:none; }
    .petal { position:absolute; top:-20px; border-radius:50% 0 50% 0; opacity:0; animation:petalFall linear infinite; }
    @keyframes petalFall {
      0%{transform:translateY(0) rotate(0deg);opacity:0;}
      8%{opacity:1;} 92%{opacity:0.8;}
      100%{transform:translateY(105vh) rotate(900deg) translateX(80px);opacity:0;}
    }

    main { position:relative; z-index:2; max-width:680px; margin:0 auto; padding:40px 20px 80px; }

    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; animation:fadeDown 0.7s var(--ease); }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-24px);} to{opacity:1;transform:translateY(0);} }

    .brand { display:flex; align-items:center; gap:16px; }
    .brand-crest {
      width:58px; height:58px; border-radius:50%;
      border:2px solid var(--gold);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; color:var(--gold);
      background:radial-gradient(circle,rgba(255,215,0,0.2),rgba(255,111,0,0.1));
      box-shadow:0 0 30px rgba(255,215,0,0.5),0 0 60px rgba(255,111,0,0.3);
      animation:crestPulse 3s ease-in-out infinite;
    }
    @keyframes crestPulse {
      0%,100%{box-shadow:0 0 30px rgba(255,215,0,0.5),0 0 60px rgba(255,111,0,0.3);}
      50%{box-shadow:0 0 50px rgba(255,215,0,0.9),0 0 100px rgba(255,111,0,0.5);}
    }
    header h1 {
      font-family:'Cinzel',serif; font-size:2.6rem; font-weight:900;
      background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 40%,var(--orange) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 20px rgba(255,215,0,0.6)); letter-spacing:3px;
    }
    .tagline { display:block; font-size:0.78rem; letter-spacing:4px; text-transform:uppercase; margin-top:3px; color:rgba(255,241,118,0.7); }
    .rank-badge {
      font-family:'Cinzel',serif; font-size:0.82rem; color:var(--cyan);
      border:1px solid rgba(0,229,255,0.5); border-radius:20px; padding:8px 18px;
      background:rgba(0,229,255,0.08); letter-spacing:1px;
      box-shadow:0 0 15px rgba(0,229,255,0.2);
    }

    .card {
      background:rgba(15,5,25,0.88); border:1px solid rgba(255,215,0,0.25);
      border-radius:8px; padding:32px 28px; backdrop-filter:blur(32px);
      box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 40px 80px rgba(0,0,0,0.8),0 0 60px rgba(255,111,0,0.1);
      animation:cardRise 0.8s var(--ease); position:relative; overflow:hidden;
    }
    .card::before {
      content:''; position:absolute; top:0; left:5%; right:5%; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),var(--orange),transparent); opacity:0.8;
    }
    @keyframes cardRise { from{opacity:0;transform:translateY(32px);} to{opacity:1;transform:translateY(0);} }

    .progress-section { margin-bottom:28px; }
    .progress-top { display:flex; justify-content:space-between; font-size:0.95rem; color:var(--muted); margin-bottom:12px; font-weight:500; }
    #progress-pct { font-family:'Cinzel',serif; color:var(--gold); font-weight:700; font-size:1.1rem; text-shadow:0 0 15px rgba(255,215,0,0.7); }
    .track { height:6px; background:rgba(255,255,255,0.07); border-radius:99px; overflow:hidden; }
    .fill { height:100%; width:0%; background:linear-gradient(90deg,var(--purple),var(--red),var(--orange),var(--gold)); border-radius:99px; transition:width 0.8s var(--ease); box-shadow:0 0 14px rgba(255,111,0,0.8); }
    .breathing-text { text-align:center; font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:5px; color:rgba(255,241,118,0.55); margin-top:12px; text-transform:uppercase; }

    .divider { display:flex; align-items:center; gap:14px; margin:24px 0; }
    .divider span:first-child,.divider span:last-child { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),transparent); }
    .div-icon { color:var(--gold); font-size:18px; flex:none !important; filter:drop-shadow(0 0 8px rgba(255,215,0,0.7)); }

    .input-row { display:flex; gap:10px; margin-bottom:16px; }
    .input-wrap { flex:1; position:relative; display:flex; align-items:center; }
    .sword-icon { position:absolute; left:14px; font-size:16px; color:var(--muted); pointer-events:none; transition:color 0.2s; }
    #input-box {
      width:100%; padding:15px 14px 15px 42px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,215,0,0.2);
      border-radius:6px; color:var(--text); font-family:'Inter',sans-serif; font-size:1rem; outline:none;
      transition:border-color 0.25s,background 0.25s,box-shadow 0.25s;
    }
    #input-box::placeholder { color:rgba(255,248,225,0.3); }
    #input-box:focus { border-color:var(--gold); background:rgba(255,215,0,0.07); box-shadow:0 0 0 3px rgba(255,215,0,0.12),0 0 20px rgba(255,215,0,0.15); }
    .input-wrap:focus-within .sword-icon { color:var(--gold); }
    #add-btn {
      padding:15px 26px; background:linear-gradient(135deg,#FF6F00,#FFD700);
      border:none; border-radius:6px; color:#0a0005;
      font-family:'Cinzel',serif; font-size:0.9rem; font-weight:700; letter-spacing:1px;
      cursor:pointer; white-space:nowrap;
      box-shadow:0 4px 20px rgba(255,111,0,0.5),0 0 30px rgba(255,215,0,0.2);
      transition:transform 0.2s var(--ease),box-shadow 0.2s;
    }
    #add-btn:hover { transform:translateY(-3px); box-shadow:0 10px 35px rgba(255,111,0,0.7),0 0 50px rgba(255,215,0,0.3); }
    #add-btn:active { transform:scale(0.96); }

    .meta-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .meta-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-right:8px; font-family:'Cinzel',serif; }
    .p-group,.d-group { display:flex; align-items:center; flex-wrap:wrap; gap:6px; }
    .p-pills { display:flex; gap:6px; }
    .p-pill { padding:6px 14px; border-radius:4px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--muted); font-size:0.8rem; cursor:pointer; transition:all 0.2s var(--ease); font-weight:500; }
    .p-pill:hover { background:rgba(255,255,255,0.09); color:var(--text); }
    .p-pill.active[data-p="high"]   { background:rgba(213,0,0,0.25);   border-color:var(--crimson); color:#FF8A80; box-shadow:0 0 15px rgba(213,0,0,0.3); }
    .p-pill.active[data-p="medium"] { background:rgba(255,215,0,0.18); border-color:var(--gold);    color:var(--gold2); box-shadow:0 0 15px rgba(255,215,0,0.3); }
    .p-pill.active[data-p="low"]    { background:rgba(0,230,118,0.15); border-color:var(--green);   color:#69F0AE; box-shadow:0 0 15px rgba(0,230,118,0.3); }
    #due-date { padding:6px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,215,0,0.2); border-radius:4px; color:var(--muted); font-size:0.8rem; outline:none; cursor:pointer; color-scheme:dark; transition:border-color 0.2s; }
    #due-date:focus { border-color:var(--gold); color:var(--text); }

    .filters { display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
    .ftab { padding:8px 20px; border-radius:4px; border:1px solid rgba(255,215,0,0.15); background:transparent; color:var(--muted); font-family:'Cinzel',serif; font-size:0.8rem; letter-spacing:0.5px; cursor:pointer; transition:all 0.2s var(--ease); }
    .ftab:hover { background:rgba(255,255,255,0.06); color:var(--text); }
    .ftab.on { background:rgba(255,215,0,0.15); border-color:var(--gold); color:var(--gold2); box-shadow:0 0 15px rgba(255,215,0,0.2); }
    .ftab.danger { margin-left:auto; border-color:rgba(213,0,0,0.4); color:rgba(255,82,82,0.8); }
    .ftab.danger:hover { background:rgba(213,0,0,0.15); color:#FF8A80; border-color:var(--crimson); }

    #list { list-style:none; display:flex; flex-direction:column; gap:10px; max-height:480px; overflow-y:auto; padding-right:4px; }
    #list::-webkit-scrollbar { width:3px; }
    #list::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.25); border-radius:99px; }

    .task {
      display:grid; grid-template-columns:34px 1fr auto;
      align-items:center; gap:14px; padding:16px 18px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,215,0,0.12);
      border-radius:6px; cursor:pointer; position:relative; overflow:hidden;
      animation:taskIn 0.4s var(--ease);
      transition:background 0.2s,border-color 0.2s,transform 0.2s;
    }
    @keyframes taskIn { from{opacity:0;transform:translateX(-16px) skewX(-4deg);} to{opacity:1;transform:translateX(0);} }
    .task::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
    .task[data-p="high"]::before   { background:linear-gradient(to bottom,transparent,#FF1744,transparent); box-shadow:0 0 10px #FF1744; }
    .task[data-p="medium"]::before { background:linear-gradient(to bottom,transparent,var(--gold),transparent); box-shadow:0 0 10px var(--gold); }
    .task[data-p="low"]::before    { background:linear-gradient(to bottom,transparent,var(--green),transparent); box-shadow:0 0 10px var(--green); }
    .task::after { content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.04) 50%,transparent 65%); transform:translateX(-100%); transition:transform 0.55s ease; pointer-events:none; }
    .task:hover::after { transform:translateX(100%); }
    .task:hover { background:rgba(255,215,0,0.06); border-color:rgba(255,215,0,0.35); transform:translateX(4px); box-shadow:0 4px 20px rgba(255,111,0,0.15); }
    .task.out { animation:taskOut 0.35s var(--ease) forwards; }
    @keyframes taskOut { to{opacity:0;transform:translateX(28px) skewX(6deg);max-height:0;margin:0;padding:0;border:0;} }

    .check { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,215,0,0.4); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.28s var(--ease); background:rgba(255,255,255,0.03); }
    .check svg { width:13px; height:13px; stroke:#000; stroke-width:3; opacity:0; transform:scale(0) rotate(-45deg); transition:all 0.25s var(--ease); }
    .task.done .check { background:linear-gradient(135deg,var(--purple),var(--cyan)); border-color:var(--cyan); box-shadow:0 0 20px rgba(0,229,255,0.6),0 0 40px rgba(170,0,255,0.4); animation:sealPop 0.4s var(--ease); }
    .task.done .check svg { opacity:1; transform:scale(1) rotate(0); }
    @keyframes sealPop { 0%{transform:scale(1);} 40%{transform:scale(1.6);} 70%{transform:scale(0.85);} 100%{transform:scale(1);} }

    .task-body { min-width:0; }
    .task-text { font-size:1rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color 0.2s; margin-bottom:5px; }
    .task.done .task-text { color:rgba(255,248,225,0.35); text-decoration:line-through; }
    .task-sub { display:flex; gap:8px; align-items:center; }
    .badge { font-size:0.68rem; font-weight:700; padding:2px 10px; border-radius:3px; text-transform:uppercase; letter-spacing:0.08em; font-family:'Cinzel',serif; }
    .badge-high   { background:rgba(213,0,0,0.25);   color:#FF8A80; border:1px solid rgba(213,0,0,0.5); }
    .badge-medium { background:rgba(255,215,0,0.15); color:var(--gold2); border:1px solid rgba(255,215,0,0.4); }
    .badge-low    { background:rgba(0,230,118,0.12); color:#69F0AE; border:1px solid rgba(0,230,118,0.4); }
    .due-tag { font-size:0.73rem; color:var(--muted); }
    .due-tag.late { color:#FF8A80; }

    .task-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
    .task:hover .task-actions { opacity:1; }
    .act { width:30px; height:30px; border-radius:4px; border:none; background:rgba(255,255,255,0.05); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; transition:all 0.18s; }
    .act:hover { background:rgba(255,215,0,0.12); color:var(--gold2); }
    .act.del:hover { background:rgba(213,0,0,0.18); color:#FF8A80; }

    .task.dragging { opacity:0.25; transform:scale(0.96); }
    .task.over { border-color:var(--gold); background:rgba(255,215,0,0.08); }

    .empty { display:none; flex-direction:column; align-items:center; gap:12px; padding:60px 20px; text-align:center; }
    .empty.show { display:flex; }
    .empty-icon { font-size:3rem; color:rgba(255,215,0,0.3); animation:emptyPulse 3s ease-in-out infinite; }
    @keyframes emptyPulse { 0%,100%{transform:scale(1);opacity:0.3;} 50%{transform:scale(1.2);opacity:0.7;} }
    .empty p { font-family:'Cinzel',serif; font-size:1.05rem; color:rgba(255,248,225,0.4); letter-spacing:2px; }
    .empty span { font-size:0.82rem; color:rgba(255,248,225,0.22); }

    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(70px); background:rgba(10,0,20,0.97); border:1px solid rgba(255,215,0,0.4); border-radius:6px; padding:13px 26px; font-size:0.88rem; font-family:'Cinzel',serif; letter-spacing:0.5px; color:var(--gold2); z-index:9999; transition:transform 0.35s var(--ease),opacity 0.35s; opacity:0; white-space:nowrap; box-shadow:0 15px 40px rgba(0,0,0,0.7),0 0 25px rgba(255,215,0,0.15); }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }
    .shake { animation:shake 0.45s var(--ease); }

    /* ══ SAMURAI ══ */
    #samurai-wrap {
      position:fixed; right:-20px; bottom:60px;
      width:130px; height:260px; z-index:10; pointer-events:none;
      transform-style:preserve-3d; perspective:600px;
    }
    #samurai-wrap.idle { animation:samuraiIdle 4s ease-in-out infinite; }
    @keyframes samuraiIdle { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    #samurai-wrap.slash { animation:samuraiSlash 1.1s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes samuraiSlash {
      0%  {transform:translateX(0) translateY(0) scaleX(1);}
      25% {transform:translateX(-440px) translateY(-10px) scaleX(-1);}
      55% {transform:translateX(-440px) translateY(-10px) scaleX(-1);}
      80% {transform:translateX(-100px) translateY(0) scaleX(-1);}
      100%{transform:translateX(0) translateY(0) scaleX(1);}
    }
    .sam { position:absolute; transform-style:preserve-3d; }

    .sam-leg { width:22px; height:54px; bottom:0; background:linear-gradient(180deg,#1A0A30,#0D0520); border-radius:4px 4px 6px 6px; box-shadow:2px 0 8px rgba(0,0,0,0.6),inset -3px 0 6px rgba(255,255,255,0.06); }
    .sam-leg-l { left:26px; }
    .sam-leg-r { left:52px; }
    .idle .sam-leg-l { animation:legL 1.2s ease-in-out infinite; }
    .idle .sam-leg-r { animation:legR 1.2s ease-in-out infinite; }
    @keyframes legL { 0%,100%{transform:rotate(0);} 50%{transform:rotate(5deg);} }
    @keyframes legR { 0%,100%{transform:rotate(0);} 50%{transform:rotate(-5deg);} }
    .slash .sam-leg-l { transform:rotate(-25deg) !important; }
    .slash .sam-leg-r { transform:rotate(20deg)  !important; }

    .sam-hakama { width:64px; height:36px; bottom:50px; left:18px; background:linear-gradient(160deg,#2A0A50,#1A0535); border-radius:4px 4px 0 0; box-shadow:inset -4px 0 10px rgba(0,0,0,0.5),2px 0 12px rgba(170,0,255,0.2); }
    .sam-hakama::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(255,215,0,0.6),transparent); }

    .sam-torso { width:56px; height:52px; bottom:82px; left:22px; background:linear-gradient(160deg,#3A0A20,#1A0510); border-radius:6px 6px 3px 3px; box-shadow:inset -5px 0 12px rgba(0,0,0,0.6),3px 0 16px rgba(255,50,50,0.15); }
    .sam-torso::before { content:''; position:absolute; top:8px; left:6px; right:6px; height:2px; background:linear-gradient(90deg,transparent,rgba(255,215,0,0.7),transparent); box-shadow:0 0 8px rgba(255,215,0,0.5); }
    .sam-torso::after { content:''; position:absolute; top:14px; left:50%; transform:translateX(-50%); width:16px; height:20px; background:linear-gradient(160deg,rgba(255,215,0,0.3),rgba(255,111,0,0.2)); border:1px solid rgba(255,215,0,0.4); clip-path:polygon(50% 0%,100% 30%,100% 100%,50% 80%,0% 100%,0% 30%); }

    .sam-shoulder { width:22px; height:14px; bottom:128px; background:linear-gradient(180deg,#4A1A30,#2A0A20); border-radius:4px; box-shadow:inset 0 -3px 6px rgba(0,0,0,0.5); }
    .sam-shoulder::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:rgba(255,215,0,0.5); border-radius:4px; box-shadow:0 0 6px rgba(255,215,0,0.4); }
    .sam-shoulder-l { left:13px; }
    .sam-shoulder-r { left:65px; }

    .sam-uarm { width:14px; height:30px; bottom:104px; background:linear-gradient(180deg,#3A1020,#1A0510); border-radius:4px; transform-origin:top center; }
    .sam-uarm-l { left:16px; }
    .sam-uarm-r { left:70px; }
    .sam-farm { width:12px; height:26px; background:linear-gradient(180deg,#2A0810,#1A0408); border-radius:3px; transform-origin:top center; position:absolute; bottom:-26px; left:1px; }

    .idle .sam-uarm-r { animation:armIdleR 4s ease-in-out infinite; }
    @keyframes armIdleR { 0%,100%{transform:rotate(-10deg);} 50%{transform:rotate(-15deg);} }
    .idle .sam-uarm-l { animation:armIdleL 4s ease-in-out infinite; }
    @keyframes armIdleL { 0%,100%{transform:rotate(10deg);} 50%{transform:rotate(15deg);} }
    .slash .sam-uarm-r { animation:armSlashR 1.1s cubic-bezier(0.4,0,0.2,1) forwards !important; }
    @keyframes armSlashR {
      0%  {transform:rotate(-120deg) translateY(-8px);}
      30% {transform:rotate(-120deg) translateY(-8px);}
      55% {transform:rotate(30deg) translateY(0);}
      100%{transform:rotate(-10deg);}
    }

    .sam-head { width:38px; height:38px; bottom:146px; left:31px; background:radial-gradient(ellipse at 40% 35%,#5C2A2A,#2A1010); border-radius:50% 50% 42% 42%; box-shadow:inset -4px -2px 8px rgba(0,0,0,0.6),2px 0 12px rgba(0,0,0,0.4); }
    .sam-eye { position:absolute; width:6px; height:5px; top:15px; background:radial-gradient(circle,#FF4444 40%,#AA0000 100%); border-radius:50%; box-shadow:0 0 6px rgba(255,50,50,0.9); animation:eyeGlow 2s ease-in-out infinite; }
    @keyframes eyeGlow { 0%,100%{opacity:0.8;} 50%{opacity:1;box-shadow:0 0 12px rgba(255,50,50,1);} }
    .sam-eye-l { left:8px; }
    .sam-eye-r { left:22px; }

    .sam-helmet { width:44px; height:26px; bottom:172px; left:28px; background:linear-gradient(160deg,#3A0A0A,#1A0505); border-radius:50% 50% 0 0; box-shadow:inset -3px -2px 8px rgba(0,0,0,0.7),0 -4px 15px rgba(255,30,30,0.2); }
    .sam-helmet::after { content:''; position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:6px; height:14px; background:linear-gradient(180deg,var(--gold),var(--orange)); clip-path:polygon(50% 0%,100% 100%,0% 100%); box-shadow:0 0 10px rgba(255,215,0,0.7); }

    .sam-sword { position:absolute; bottom:-55px; left:-5px; width:9px; height:86px; transform-origin:top center; filter:drop-shadow(0 0 6px rgba(0,229,255,0.7)); }
    .sword-guard { position:absolute; top:0; left:-7px; width:22px; height:5px; background:linear-gradient(90deg,#C0A020,#FFD700,#C0A020); border-radius:3px; box-shadow:0 0 8px rgba(255,215,0,0.6); }
    .sword-grip { position:absolute; top:5px; left:0; width:9px; height:18px; background:linear-gradient(180deg,#3A2010,#1A0808); border-radius:2px; }
    .sword-blade { position:absolute; top:23px; left:1px; width:7px; height:63px; background:linear-gradient(180deg,rgba(180,220,255,0.95),rgba(150,220,255,0.85) 40%,rgba(100,200,255,0.7)); clip-path:polygon(0 0,100% 0,70% 100%,30% 100%); box-shadow:0 0 10px rgba(0,229,255,0.8),inset 1px 0 2px rgba(255,255,255,0.5); }
    .sword-blade::after { content:''; position:absolute; inset:0; background:linear-gradient(160deg,rgba(255,255,255,0.5) 0%,transparent 60%); clip-path:polygon(0 0,100% 0,70% 100%,30% 100%); }

    /* ══ SLASH FX ══ */
    #slash-fx { position:fixed; pointer-events:none; z-index:20; top:0; left:0; width:100%; height:100%; display:none; }
    #slash-fx.active { display:block; }
    .slash-line { position:absolute; height:3px; background:linear-gradient(90deg,transparent,rgba(0,229,255,0.9),rgba(255,255,255,1),rgba(0,229,255,0.9),transparent); border-radius:99px; box-shadow:0 0 12px rgba(0,229,255,1),0 0 24px rgba(0,229,255,0.6); transform-origin:left center; animation:slashLine 0.35s ease-out forwards; }
    @keyframes slashLine { 0%{width:0;opacity:1;} 60%{width:65vw;opacity:1;} 100%{width:65vw;opacity:0;} }
    .spark { position:absolute; width:4px; height:4px; border-radius:50%; animation:sparkFly 0.5s ease-out forwards; }
    @keyframes sparkFly { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;} }

    footer { text-align:center; margin-top:28px; font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:3px; color:rgba(255,248,225,0.22); text-transform:uppercase; }

    @media (max-width:520px) {
      main { padding:24px 12px 60px; }
      header h1 { font-size:2rem; }
      .card { padding:22px 14px; }
      #add-btn { padding:15px 16px; font-size:0.82rem; }
      #samurai-wrap { right:-28px; bottom:40px; transform:scale(0.8); transform-origin:bottom right; }
    }
  </style>
</head>
<body>

<div class="bg-scene"></div>
<div class="grid-lines"></div>
<div id="petals"></div>
<div id="slash-fx"></div>

<div id="samurai-wrap" class="idle">
  <div class="sam sam-leg sam-leg-l"></div>
  <div class="sam sam-leg sam-leg-r"></div>
  <div class="sam sam-hakama"></div>
  <div class="sam sam-torso"></div>
  <div class="sam sam-shoulder sam-shoulder-l"></div>
  <div class="sam sam-shoulder sam-shoulder-r"></div>
  <div class="sam sam-uarm sam-uarm-l"></div>
  <div class="sam sam-uarm sam-uarm-r">
    <div class="sam-farm"></div>
    <div class="sam-sword">
      <div class="sword-guard"></div>
      <div class="sword-grip"></div>
      <div class="sword-blade"></div>
    </div>
  </div>
  <div class="sam sam-head">
    <div class="sam-eye sam-eye-l"></div>
    <div class="sam-eye sam-eye-r"></div>
  </div>
  <div class="sam sam-helmet"></div>
</div>

<main>
  <header>
    <div class="brand">
      <div class="brand-crest">⚔</div>
      <div>
        <h1>Tasko</h1>
        <span class="tagline">Mission Scroll</span>
      </div>
    </div>
    <div class="rank-badge"><span id="rank-label">Rank: Mizunoto</span></div>
  </header>

  <div class="card">
    <div class="progress-section">
      <div class="progress-top">
        <span id="progress-label">Awaiting orders...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="track"><div class="fill" id="fill"></div></div>
      <div class="breathing-text" id="breathing-text">Total Concentration</div>
    </div>

    <div class="divider"><span></span><span class="div-icon">⚔</span><span></span></div>

    <div class="input-section">
      <div class="input-row">
        <div class="input-wrap">
          <span class="sword-icon">⚔</span>
          <input type="text" id="input-box" placeholder="Name your mission..." autocomplete="off" spellcheck="false"/>
        </div>
        <button id="add-btn" onclick="addTask()">Carve It</button>
      </div>
      <div class="meta-row">
        <div class="p-group">
          <span class="meta-label">Urgency</span>
          <div class="p-pills">
            <button class="p-pill" data-p="high">🔴 Critical</button>
            <button class="p-pill active" data-p="medium">🟡 Standard</button>
            <button class="p-pill" data-p="low">🟢 Patrol</button>
          </div>
        </div>
        <div class="d-group">
          <span class="meta-label">Deadline</span>
          <input type="date" id="due-date"/>
        </div>
      </div>
    </div>

    <div class="divider"><span></span><span class="div-icon">✦</span><span></span></div>

    <div class="filters">
      <button class="ftab on" data-f="all">All</button>
      <button class="ftab" data-f="active">Active</button>
      <button class="ftab" data-f="done">Done</button>
      <button class="ftab danger" id="clear-btn">Clear Done</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty">
      <div class="empty-icon">⚔</div>
      <p>The scroll is empty</p>
      <span>Carve your first mission above</span>
    </div>
  </div>

  <footer>Breath of the Sun &nbsp;·&nbsp; Total Concentration</footer>
</main>

<script>
let tasks = JSON.parse(localStorage.getItem('tasko-ds')) || [];
let filter = 'all', priority = 'medium', dragFrom = null;

const RANKS = [
  {min:0,label:'Rank: Mizunoto'},{min:1,label:'Rank: Mizunoe'},{min:5,label:'Rank: Kanoto'},
  {min:10,label:'Rank: Kanoe'},{min:20,label:'Rank: Tsuchinoto'},{min:35,label:'Rank: Tsuchinoe'},
  {min:50,label:'Rank: Hinoto'},{min:75,label:'Rank: Hinoe'},{min:100,label:'Rank: Kinoto'},{min:150,label:'Hashira'},
];
const BREATH = ['Total Concentration','Breath of Water','Breath of Flame','Breath of Thunder','Breath of Wind','Breath of Stone','Breath of the Sun'];

document.addEventListener('DOMContentLoaded', () => {
  spawnPetals(); setupPriority(); setupTabs(); setupClear();
  document.getElementById('input-box').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
  render();
});

function spawnPetals() {
  const wrap = document.getElementById('petals');
  const colors = ['#FF6F00','#FFD700','#FF1744','#AA00FF','#00E5FF','#FF4081'];
  for(let i=0;i<24;i++){
    const p = document.createElement('div'); p.className='petal';
    const size = Math.random()*8+4, c = colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;background:radial-gradient(circle,${c},transparent);animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*14}s;`;
    wrap.appendChild(p);
  }
}

function setupPriority() {
  document.querySelectorAll('.p-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.p-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); priority = btn.dataset.p;
    });
  });
}

function setupTabs() {
  document.querySelectorAll('.ftab[data-f]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.ftab[data-f]').forEach(t=>t.classList.remove('on'));
      tab.classList.add('on'); filter = tab.dataset.f; render();
    });
  });
}

function setupClear() {
  document.getElementById('clear-btn').addEventListener('click', () => {
    const n = tasks.filter(t=>t.done).length;
    if(!n){ toast('No completed missions'); return; }
    tasks = tasks.filter(t=>!t.done); save(); render();
    toast(`${n} mission${n>1?'s':''} cleared`);
  });
}

function addTask() {
  const inp = document.getElementById('input-box');
  const text = inp.value.trim();
  if(!text){
    inp.classList.add('shake');
    inp.addEventListener('animationend',()=>inp.classList.remove('shake'),{once:true});
    toast('Name your mission first'); return;
  }
  tasks.unshift({id:Date.now(),text,done:false,priority,due:document.getElementById('due-date').value||null});
  inp.value=''; document.getElementById('due-date').value='';
  save(); render(); toast('Mission carved into the scroll');
}

function toggleTask(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t.done = !t.done; save(); render();
  if(t.done){
    triggerSlash(id);
    const allDone = tasks.length && tasks.every(t=>t.done);
    setTimeout(()=>toast(allDone?'All demons slain. You are Hashira.':'Mission complete. Demon slain.'),600);
  }
}

function deleteTask(id) {
  const el = document.querySelector(`[data-id="${id}"]`); if(!el) return;
  el.classList.add('out');
  el.addEventListener('animationend',()=>{ tasks=tasks.filter(t=>t.id!==id); save(); render(); },{once:true});
}

function editTask(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const el = document.querySelector(`[data-id="${id}"] .task-text`);
  el.contentEditable='true'; el.focus();
  const r=document.createRange(); r.selectNodeContents(el);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
  const commit=()=>{ const v=el.textContent.trim(); if(v) t.text=v; el.contentEditable='false'; save(); render(); };
  el.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){el.contentEditable='false';render();} },{once:true});
  el.addEventListener('blur',commit,{once:true});
}

function triggerSlash(id) {
  const taskEl = document.querySelector(`[data-id="${id}"]`);
  const sam = document.getElementById('samurai-wrap');
  const fx  = document.getElementById('slash-fx');
  const rect = taskEl ? taskEl.getBoundingClientRect() : {top:window.innerHeight/2,height:40};
  const slashY = rect.top + rect.height/2;

  sam.classList.remove('idle','slash'); void sam.offsetWidth; sam.classList.add('slash');
  sam.addEventListener('animationend',()=>{ sam.classList.remove('slash'); sam.classList.add('idle'); },{once:true});

  setTimeout(()=>{
    fx.classList.add('active'); fx.innerHTML='';
    const line=document.createElement('div'); line.className='slash-line';
    line.style.cssText=`top:${slashY}px;left:18vw;`; fx.appendChild(line);
    const sparks=document.createElement('div'); sparks.style.cssText=`position:absolute;top:${slashY}px;left:40vw;`;
    for(let i=0;i<18;i++){
      const sp=document.createElement('div'); sp.className='spark';
      const angle=Math.random()*Math.PI*2, dist=30+Math.random()*70;
      sp.style.setProperty('--dx',`${Math.cos(angle)*dist}px`);
      sp.style.setProperty('--dy',`${Math.sin(angle)*dist}px`);
      sp.style.background=['#FFD700','#FF6F00','#00E5FF','#FF1744'][Math.floor(Math.random()*4)];
      sp.style.animationDelay=Math.random()*0.12+'s';
      sparks.appendChild(sp);
    }
    fx.appendChild(sparks);
    setTimeout(()=>{ fx.classList.remove('active'); fx.innerHTML=''; },600);
  },420);
}

function render() {
  const list=document.getElementById('list'), empty=document.getElementById('empty');
  const visible=tasks.filter(t=>{ if(filter==='active') return !t.done; if(filter==='done') return t.done; return true; });
  list.innerHTML='';
  if(!visible.length){ empty.classList.add('show'); }
  else { empty.classList.remove('show'); visible.forEach((t,i)=>list.appendChild(makeTask(t,i))); }
  updateStats();
}

function makeTask(t,i) {
  const li=document.createElement('li');
  li.className=`task${t.done?' done':''}`;
  li.dataset.id=t.id; li.dataset.p=t.priority;
  li.style.animationDelay=`${i*0.045}s`; li.draggable=true;
  let dueHtml='';
  if(t.due){
    const d=new Date(t.due+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
    const late=d<now&&!t.done;
    dueHtml=`<span class="due-tag${late?' late':''}">${late?'⚠ Overdue · ':''}${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
  }
  li.innerHTML=`
    <div class="check" onclick="toggleTask(${t.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-body">
      <div class="task-text">${esc(t.text)}</div>
      <div class="task-sub"><span class="badge badge-${t.priority}">${t.priority}</span>${dueHtml}</div>
    </div>
    <div class="task-actions">
      <button class="act" onclick="editTask(${t.id})" title="Edit">✎</button>
      <button class="act del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
    </div>`;
  li.addEventListener('dragstart',()=>{ dragFrom=tasks.findIndex(x=>x.id===t.id); li.classList.add('dragging'); });
  li.addEventListener('dragend',()=>li.classList.remove('dragging'));
  li.addEventListener('dragover',e=>{ e.preventDefault(); li.classList.add('over'); });
  li.addEventListener('dragleave',()=>li.classList.remove('over'));
  li.addEventListener('drop',e=>{
    e.preventDefault(); li.classList.remove('over');
    const to=tasks.findIndex(x=>x.id===t.id);
    if(dragFrom!==null&&dragFrom!==to){ const[m]=tasks.splice(dragFrom,1); tasks.splice(to,0,m); dragFrom=null; save(); render(); }
  });
  return li;
}

function updateStats() {
  const total=tasks.length, done=tasks.filter(t=>t.done).length;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  const msgs=['Awaiting orders...',`${total-done} mission${total-done!==1?'s':''} remaining`,'Push forward, demon slayer','Nearly there — hold your breath.','All demons slain.'];
  document.getElementById('progress-label').textContent=msgs[total===0?0:pct===100?4:pct>=75?3:pct>=40?2:1];
  let rank=RANKS[0]; for(const r of RANKS){ if(done>=r.min) rank=r; }
  document.getElementById('rank-label').textContent=rank.label;
  document.getElementById('breathing-text').textContent=BREATH[Math.floor((pct/100)*(BREATH.length-1))];
}

function toast(msg) {
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add('show');
  clearTimeout(window._t); window._t=setTimeout(()=>el.classList.remove('show'),2800);
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function save(){ localStorage.setItem('tasko-ds',JSON.stringify(tasks)); }
</script>
</body>
</html>
