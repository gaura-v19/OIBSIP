<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasko</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <main>

    <header>
      <div class="brand">
        <div class="brand-icon">✓</div>
        <h1>Tasko</h1>
      </div>
      <div class="counter-wrap">
        <span id="counter">0 tasks</span>
      </div>
    </header>

    <section class="progress-wrap">
      <div class="progress-info">
        <span id="progress-label">Ready when you are</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="track">
        <div class="fill" id="fill"></div>
      </div>
    </section>

    <section class="input-section">
      <div class="input-group">
        <input type="text" id="input-box" placeholder="What's on your mind?" autocomplete="off" spellcheck="false"/>
        <button id="add-btn" onclick="addTask()">Add it</button>
      </div>
      <div class="options-row">
        <div class="priority-row">
          <button class="p-btn" data-p="high">🔴 High</button>
          <button class="p-btn selected" data-p="medium">🟡 Med</button>
          <button class="p-btn" data-p="low">🟢 Low</button>
        </div>
        <input type="date" id="due-date" title="Due date"/>
      </div>
    </section>

    <div class="tabs">
      <button class="tab on" data-f="all">All</button>
      <button class="tab" data-f="active">Active</button>
      <button class="tab" data-f="done">Done</button>
      <button class="tab danger" id="clear-btn">Clear done</button>
    </div>

    <ul id="list"></ul>

    <div class="empty" id="empty">
      <div class="empty-graphic">
        <div class="e-circle c1"></div>
        <div class="e-circle c2"></div>
        <div class="e-circle c3"></div>
        <span class="e-tick">✓</span>
      </div>
      <p>Nothing here yet</p>
      <span>Add your first task above</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
