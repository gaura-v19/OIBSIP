<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Management App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --pink:   #FF3CAC;
      --purple: #784BA0;
      --blue:   #2B86C5;
      --orange: #FF6B35;
      --yellow: #FFD93D;
      --green:  #6BCB77;
      --cyan:   #4D96FF;
      --text:   #1a1a2e;
      --muted:  #555577;
      --card:   #ffffff;
      --ease:   cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior:smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf5 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: linear-gradient(90deg, #FF3CAC, #784BA0, #2B86C5);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(120,75,160,0.3);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-title {
      font-size: 1.4rem; font-weight: 800;
      color: #fff; letter-spacing: 1px;
      display: flex; align-items: center; gap: 10px;
    }
    .topbar-title span { font-size: 1.5rem; }
    .topbar-stats {
      display: flex; gap: 20px;
    }
    .stat-chip {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; padding: 5px 16px;
      color: #fff; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ── LAYOUT ── */
    .app-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: auto 1fr;
      min-height: calc(100vh - 64px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid #e0e0f0;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 28px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.06);
    }

    .sidebar-section-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 12px;
    }

    /* Add Task Form */
    .add-form { display: flex; flex-direction: column; gap: 12px; }

    .input-field {
      width: 100%; padding: 12px 16px;
      border: 2px solid #e8e8f0; border-radius: 12px;
      font-family: 'Poppins', sans-serif; font-size: 0.92rem;
      color: var(--text); background: #fafafa;
      outline: none; transition: all 0.2s var(--ease);
    }
    .input-field:focus { border-color: var(--purple); background: #fff; box-shadow: 0 0 0 4px rgba(120,75,160,0.1); }
    .input-field::placeholder { color: #aaa; }

    textarea.input-field { resize: none; height: 72px; line-height: 1.5; }

    .label { font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; display: block; }

    /* Priority pills */
    .priority-group { display: flex; gap: 8px; }
    .pri-btn {
      flex: 1; padding: 8px 6px; border-radius: 10px;
      border: 2px solid transparent; background: #f0f0f8;
      font-family: 'Poppins', sans-serif; font-size: 0.72rem;
      font-weight: 600; cursor: pointer; text-align: center;
      transition: all 0.18s var(--ease); color: var(--muted);
    }
    .pri-btn:hover { transform: translateY(-2px); }
    .pri-btn.active[data-p="high"]   { background: #fff0f3; border-color: #ff3860; color: #ff3860; box-shadow: 0 4px 12px rgba(255,56,96,0.2); }
    .pri-btn.active[data-p="medium"] { background: #fffbf0; border-color: #FFD93D; color: #e6a800; box-shadow: 0 4px 12px rgba(255,217,61,0.2); }
    .pri-btn.active[data-p="low"]    { background: #f0fff4; border-color: #6BCB77; color: #2d9e3a; box-shadow: 0 4px 12px rgba(107,203,119,0.2); }

    /* Date input */
    .date-input {
      width: 100%; padding: 10px 14px;
      border: 2px solid #e8e8f0; border-radius: 12px;
      font-family: 'Poppins', sans-serif; font-size: 0.85rem;
      color: var(--text); background: #fafafa; outline: none;
      transition: border-color 0.2s;
    }
    .date-input:focus { border-color: var(--purple); background: #fff; }

    .add-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #FF3CAC, #784BA0);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s var(--ease);
      box-shadow: 0 6px 20px rgba(120,75,160,0.35);
      letter-spacing: 0.5px;
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(120,75,160,0.45); }
    .add-btn:active { transform: scale(0.98); }

    /* Filter section */
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px; border: none;
      background: transparent; color: var(--muted);
      font-family: 'Poppins', sans-serif; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; text-align: left;
      transition: all 0.18s var(--ease);
    }
    .filter-btn:hover { background: #f5f0ff; color: var(--purple); }
    .filter-btn.on { background: linear-gradient(135deg, rgba(255,60,172,0.1), rgba(120,75,160,0.1)); color: var(--purple); font-weight: 700; }
    .filter-btn .fbadge {
      margin-left: auto; min-width: 24px; height: 24px;
      background: var(--purple); color: #fff;
      border-radius: 8px; font-size: 0.72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; padding: 0 6px;
    }
    .filter-btn.on .fbadge { background: linear-gradient(135deg, #FF3CAC, #784BA0); }
    .filter-icon { font-size: 1.1rem; }

    /* Sort section */
    .sort-group { display: flex; flex-direction: column; gap: 6px; }
    .sort-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 10px; border: none;
      background: transparent; color: var(--muted);
      font-family: 'Poppins', sans-serif; font-size: 0.82rem;
      font-weight: 500; cursor: pointer; text-align: left;
      transition: all 0.18s var(--ease);
    }
    .sort-btn:hover { background: #f5f0ff; color: var(--purple); }
    .sort-btn.on { background: rgba(120,75,160,0.08); color: var(--purple); font-weight: 600; }

    /* Illustration panel */
    .illus-panel {
      background: linear-gradient(160deg, #fff9f0, #fff0fa);
      border: 1px solid #f0e0f8; border-radius: 16px;
      padding: 20px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .illus-svg { width: 120px; height: 120px; }
    .illus-msg { font-size: 0.8rem; color: var(--muted); font-weight: 500; line-height: 1.5; }

    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 28px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* Content header */
    .content-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .content-title { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .content-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .clear-btn {
      padding: 8px 18px; border-radius: 10px;
      border: 2px solid #ffccd5; background: #fff5f7;
      color: #ff3860; font-family: 'Poppins', sans-serif;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: all 0.18s var(--ease);
    }
    .clear-btn:hover { background: #ff3860; color: #fff; border-color: #ff3860; }

    /* ── TASK GRID ── */
    #task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      align-content: start;
    }

    /* ── TASK CARD ── */
    .task-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border: 2px solid transparent;
      position: relative; overflow: hidden;
      animation: cardIn 0.35s var(--ease);
      transition: transform 0.2s var(--ease), box-shadow 0.2s, border-color 0.2s;
      cursor: default;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(16px) scale(0.97);} to{opacity:1;transform:translateY(0) scale(1);} }
    .task-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
    .task-card.done { opacity: 0.65; }
    .task-card.out  { animation: cardOut 0.3s var(--ease) forwards; }
    @keyframes cardOut { to{opacity:0;transform:scale(0.9) translateY(10px);} }

    /* top color bar */
    .task-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:4px;
    }
    .task-card[data-p="high"]::before   { background: linear-gradient(90deg,#FF3CAC,#ff3860); }
    .task-card[data-p="medium"]::before { background: linear-gradient(90deg,#FFD93D,#FF6B35); }
    .task-card[data-p="low"]::before    { background: linear-gradient(90deg,#6BCB77,#4D96FF); }

    .task-card[data-p="high"]   { border-color: rgba(255,56,96,0.15); }
    .task-card[data-p="medium"] { border-color: rgba(255,217,61,0.25); }
    .task-card[data-p="low"]    { border-color: rgba(107,203,119,0.25); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }

    .task-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #ddd; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.22s var(--ease);
      margin-top: 2px;
    }
    .task-check svg { width: 11px; height: 11px; stroke: #fff; stroke-width: 3; opacity: 0; transform: scale(0); transition: all 0.2s var(--ease); }
    .task-card.done .task-check { background: linear-gradient(135deg,#6BCB77,#4D96FF); border-color: #6BCB77; box-shadow: 0 0 12px rgba(107,203,119,0.4); }
    .task-card.done .task-check svg { opacity:1; transform:scale(1); }

    .task-title {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      flex: 1; line-height: 1.4; word-break: break-word;
      transition: color 0.2s;
    }
    .task-card.done .task-title { text-decoration: line-through; color: #aaa; }

    .card-actions { display: flex; gap: 4px; }
    .act {
      width: 28px; height: 28px; border-radius: 8px; border: none;
      background: #f5f5fb; color: #aaa; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.18s;
    }
    .act:hover { background: #ede8ff; color: var(--purple); }
    .act.del:hover { background: #fff0f3; color: #ff3860; }

    .task-note {
      font-size: 0.8rem; color: var(--muted); line-height: 1.5;
      margin-bottom: 12px; word-break: break-word;
    }
    .task-card.done .task-note { color: #ccc; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

    .pri-tag {
      font-size: 0.65rem; font-weight: 700; padding: 3px 10px;
      border-radius: 6px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .pri-tag.high   { background: #fff0f3; color: #ff3860; border: 1px solid rgba(255,56,96,0.2); }
    .pri-tag.medium { background: #fffbf0; color: #e6a800; border: 1px solid rgba(255,217,61,0.3); }
    .pri-tag.low    { background: #f0fff4; color: #2d9e3a; border: 1px solid rgba(107,203,119,0.3); }

    .due-tag {
      font-size: 0.72rem; font-weight: 500; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .due-tag.late { color: #ff3860; font-weight: 600; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      display: none; flex-direction: column; align-items: center;
      gap: 16px; padding: 80px 20px; text-align: center;
    }
    .empty-state.show { display: flex; }
    .empty-svg { width: 160px; opacity: 0.5; animation: emptyFloat 3s ease-in-out infinite; }
    @keyframes emptyFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .empty-state p { font-size: 1.1rem; font-weight: 600; color: #bbb; }
    .empty-state span { font-size: 0.85rem; color: #ccc; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a1a2e; border-radius: 12px;
      padding: 12px 24px; font-size: 0.85rem; font-weight: 600;
      color: #fff; z-index: 9999;
      transition: transform 0.3s var(--ease), opacity 0.3s;
      opacity: 0; white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── SHAKE ── */
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
    .shake { animation: shake 0.4s var(--ease); }

    /* ── EDIT MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff; border-radius: 20px; padding: 32px;
      width: 100%; max-width: 440px; margin: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.3s var(--ease);
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.92) translateY(20px);} to{opacity:1;transform:scale(1) translateY(0);} }
    .modal h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; color: var(--text); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-save {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      background: linear-gradient(135deg,#FF3CAC,#784BA0);
      color: #fff; font-family: 'Poppins',sans-serif;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s var(--ease);
      box-shadow: 0 4px 16px rgba(120,75,160,0.3);
    }
    .modal-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(120,75,160,0.4); }
    .modal-cancel {
      padding: 12px 20px; border-radius: 12px;
      border: 2px solid #e8e8f0; background: transparent;
      color: var(--muted); font-family: 'Poppins',sans-serif;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all 0.18s;
    }
    .modal-cancel:hover { background: #f5f5fb; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .app-layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid #e0e0f0; }
      .main-content { padding: 20px 16px; }
      .topbar { padding: 0 16px; }
      .topbar-stats { display: none; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-title">
    <span>✅</span> Task Management App
  </div>
  <div class="topbar-stats">
    <div class="stat-chip" id="stat-total">0 Total</div>
    <div class="stat-chip" id="stat-active">0 Active</div>
    <div class="stat-chip" id="stat-done">0 Done</div>
  </div>
</div>

<div class="app-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- Add Task -->
    <div>
      <div class="sidebar-section-title">➕ Add New Task</div>
      <div class="add-form">
        <div>
          <input type="text" class="input-field" id="task-title" placeholder="Task title..." autocomplete="off"/>
        </div>
        <div>
          <textarea class="input-field" id="task-note" placeholder="Notes (optional)..."></textarea>
        </div>
        <div>
          <span class="label">Priority</span>
          <div class="priority-group">
            <button class="pri-btn" data-p="high">🔴 High</button>
            <button class="pri-btn active" data-p="medium">🟡 Medium</button>
            <button class="pri-btn" data-p="low">🟢 Low</button>
          </div>
        </div>
        <div>
          <span class="label">Deadline</span>
          <input type="date" class="date-input" id="task-due"/>
        </div>
        <button class="add-btn" onclick="addTask()">+ Add Task</button>
      </div>
    </div>

    <!-- Filters -->
    <div>
      <div class="sidebar-section-title">🔍 Filter</div>
      <div class="filter-group">
        <button class="filter-btn on" data-f="all">
          <span class="filter-icon">📋</span> All Tasks
          <span class="fbadge" id="badge-all">0</span>
        </button>
        <button class="filter-btn" data-f="active">
          <span class="filter-icon">⚡</span> Active
          <span class="fbadge" id="badge-active">0</span>
        </button>
        <button class="filter-btn" data-f="done">
          <span class="filter-icon">✅</span> Completed
          <span class="fbadge" id="badge-done">0</span>
        </button>
        <button class="filter-btn" data-f="high">
          <span class="filter-icon">🔴</span> High Priority
          <span class="fbadge" id="badge-high">0</span>
        </button>
        <button class="filter-btn" data-f="overdue">
          <span class="filter-icon">⚠️</span> Overdue
          <span class="fbadge" id="badge-overdue">0</span>
        </button>
      </div>
    </div>

    <!-- Sort -->
    <div>
      <div class="sidebar-section-title">↕️ Sort By</div>
      <div class="sort-group">
        <button class="sort-btn on" data-s="newest">🕐 Newest First</button>
        <button class="sort-btn" data-s="oldest">🕑 Oldest First</button>
        <button class="sort-btn" data-s="priority">🎯 Priority</button>
        <button class="sort-btn" data-s="due">📅 Due Date</button>
      </div>
    </div>

    <!-- Illustration -->
    <div class="illus-panel">
      <svg class="illus-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- desk -->
        <rect x="20" y="150" width="160" height="12" rx="6" fill="#e0d4f7"/>
        <rect x="40" y="162" width="10" height="28" rx="4" fill="#c9b8ec"/>
        <rect x="150" y="162" width="10" height="28" rx="4" fill="#c9b8ec"/>
        <!-- monitor -->
        <rect x="55" y="80" width="90" height="62" rx="8" fill="#784BA0"/>
        <rect x="60" y="85" width="80" height="50" rx="5" fill="#fff"/>
        <!-- screen lines -->
        <rect x="66" y="92" width="50" height="4" rx="2" fill="#FF3CAC" opacity="0.6"/>
        <rect x="66" y="100" width="38" height="4" rx="2" fill="#4D96FF" opacity="0.6"/>
        <rect x="66" y="108" width="44" height="4" rx="2" fill="#6BCB77" opacity="0.6"/>
        <rect x="66" y="116" width="30" height="4" rx="2" fill="#FFD93D" opacity="0.6"/>
        <!-- stand -->
        <rect x="93" y="142" width="14" height="10" rx="2" fill="#c9b8ec"/>
        <rect x="83" y="150" width="34" height="5" rx="2" fill="#b8a8dc"/>
        <!-- keyboard -->
        <rect x="62" y="155" width="50" height="8" rx="3" fill="#ddd"/>
        <!-- coffee -->
        <ellipse cx="155" cy="151" rx="12" ry="4" fill="#e0d4f7"/>
        <rect x="143" y="128" width="24" height="23" rx="5" fill="#FF6B35" opacity="0.9"/>
        <path d="M167 135 Q175 135 175 141 Q175 147 167 147" stroke="#FF6B35" stroke-width="3" fill="none" opacity="0.7"/>
        <!-- steam -->
        <path d="M151 124 Q153 118 151 112" stroke="#c9b8ec" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
        <path d="M155 122 Q157 116 155 110" stroke="#c9b8ec" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
        <!-- plant -->
        <rect x="22" y="130" width="8" height="22" rx="2" fill="#8B6914" opacity="0.7"/>
        <ellipse cx="26" cy="128" rx="12" ry="14" fill="#6BCB77" opacity="0.8"/>
        <ellipse cx="18" cy="120" rx="8" ry="10" fill="#4CAF50" opacity="0.7"/>
        <ellipse cx="34" cy="118" rx="8" ry="10" fill="#4CAF50" opacity="0.7"/>
        <!-- checkmark floating -->
        <circle cx="158" cy="52" r="18" fill="#6BCB77" opacity="0.15"/>
        <circle cx="158" cy="52" r="14" fill="#6BCB77"/>
        <polyline points="151,52 156,58 166,45" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- star decorations -->
        <circle cx="45" cy="40" r="4" fill="#FFD93D" opacity="0.7"/>
        <circle cx="170" cy="30" r="3" fill="#FF3CAC" opacity="0.6"/>
        <circle cx="30" cy="70" r="3" fill="#4D96FF" opacity="0.5"/>
      </svg>
      <div class="illus-msg" id="illus-msg">Add your first task<br/>and get things done! 🚀</div>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <div class="main-content">

    <div class="content-header">
      <div>
        <div class="content-title" id="content-title">All Tasks</div>
        <div class="content-subtitle" id="content-subtitle">Showing all tasks</div>
      </div>
      <button class="clear-btn" id="clear-btn">🗑 Clear Completed</button>
    </div>

    <div id="task-grid">
      <div class="empty-state show" id="empty-state">
        <svg class="empty-svg" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="40" y="30" width="120" height="140" rx="12" fill="#f0eaff"/>
          <rect x="55" y="55" width="90" height="8" rx="4" fill="#d4c5f9"/>
          <rect x="55" y="72" width="70" height="8" rx="4" fill="#d4c5f9"/>
          <rect x="55" y="89" width="80" height="8" rx="4" fill="#d4c5f9"/>
          <rect x="55" y="106" width="55" height="8" rx="4" fill="#d4c5f9"/>
          <circle cx="100" cy="28" r="20" fill="#FF3CAC" opacity="0.15"/>
          <text x="92" y="34" font-size="20">📝</text>
        </svg>
        <p>No tasks here yet</p>
        <span>Use the form on the left to add your first task</span>
      </div>
    </div>

  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h3>✏️ Edit Task</h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <input type="text" class="input-field" id="edit-title" placeholder="Task title..."/>
      <textarea class="input-field" id="edit-note" placeholder="Notes (optional)..." style="height:72px;resize:none;"></textarea>
      <div>
        <span class="label">Priority</span>
        <div class="priority-group" id="edit-priority-group">
          <button class="pri-btn" data-p="high">🔴 High</button>
          <button class="pri-btn active" data-p="medium">🟡 Medium</button>
          <button class="pri-btn" data-p="low">🟢 Low</button>
        </div>
      </div>
      <div>
        <span class="label">Deadline</span>
        <input type="date" class="date-input" id="edit-due"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let tasks    = JSON.parse(localStorage.getItem('tma-tasks')) || [];
let filter   = 'all';
let sort     = 'newest';
let priority = 'medium';
let editId   = null;
let editPri  = 'medium';

// ── BOOT ──
document.addEventListener('DOMContentLoaded', () => {
  setupPriority();
  setupFilters();
  setupSort();
  document.getElementById('clear-btn').addEventListener('click', clearDone);
  document.getElementById('task-title').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
  render();
});

// ── PRIORITY PILLS ──
function setupPriority() {
  document.querySelectorAll('.add-form .pri-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.add-form .pri-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      priority = btn.dataset.p;
    });
  });
}

// ── FILTERS ──
function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      filter = btn.dataset.f;
      render();
    });
  });
}

// ── SORT ──
function setupSort() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      sort = btn.dataset.s;
      render();
    });
  });
}

// ── ADD ──
function addTask() {
  const titleEl = document.getElementById('task-title');
  const title   = titleEl.value.trim();
  if(!title) {
    titleEl.classList.add('shake');
    titleEl.addEventListener('animationend', () => titleEl.classList.remove('shake'), {once:true});
    toast('⚠️ Please enter a task title'); return;
  }
  tasks.unshift({
    id:       Date.now(),
    title,
    note:     document.getElementById('task-note').value.trim(),
    done:     false,
    priority,
    due:      document.getElementById('task-due').value || null,
    created:  Date.now()
  });
  titleEl.value = '';
  document.getElementById('task-note').value = '';
  document.getElementById('task-due').value  = '';
  save(); render();
  toast('✅ Task added!');
}

// ── TOGGLE ──
function toggleTask(id) {
  const t = tasks.find(t => t.id===id); if(!t) return;
  t.done = !t.done; save(); render();
  toast(t.done ? '🎉 Task completed!' : '🔄 Marked as active');
}

// ── DELETE ──
function deleteTask(id) {
  const el = document.querySelector(`[data-id="${id}"]`); if(!el) return;
  el.classList.add('out');
  el.addEventListener('animationend', () => { tasks = tasks.filter(t => t.id!==id); save(); render(); }, {once:true});
}

// ── EDIT MODAL ──
function openEdit(id) {
  const t = tasks.find(t => t.id===id); if(!t) return;
  editId  = id;
  editPri = t.priority;
  document.getElementById('edit-title').value = t.title;
  document.getElementById('edit-note').value  = t.note || '';
  document.getElementById('edit-due').value   = t.due  || '';
  document.querySelectorAll('#edit-priority-group .pri-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.p === t.priority);
    btn.addEventListener('click', () => {
      document.querySelectorAll('#edit-priority-group .pri-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); editPri = btn.dataset.p;
    });
  });
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  editId = null;
}

function saveEdit() {
  const t = tasks.find(t => t.id===editId); if(!t) return;
  const newTitle = document.getElementById('edit-title').value.trim();
  if(!newTitle) { toast('⚠️ Title cannot be empty'); return; }
  t.title    = newTitle;
  t.note     = document.getElementById('edit-note').value.trim();
  t.due      = document.getElementById('edit-due').value || null;
  t.priority = editPri;
  closeModal(); save(); render();
  toast('✏️ Task updated!');
}

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-backdrop')) closeModal();
});

// ── CLEAR DONE ──
function clearDone() {
  const n = tasks.filter(t => t.done).length;
  if(!n) { toast('No completed tasks to clear'); return; }
  tasks = tasks.filter(t => !t.done); save(); render();
  toast(`🗑 Cleared ${n} completed task${n>1?'s':''}`);
}

// ── RENDER ──
function render() {
  const grid  = document.getElementById('task-grid');
  const empty = document.getElementById('empty-state');
  const now   = new Date(); now.setHours(0,0,0,0);

  // filter
  let visible = tasks.filter(t => {
    if(filter==='active')  return !t.done;
    if(filter==='done')    return  t.done;
    if(filter==='high')    return  t.priority==='high';
    if(filter==='overdue') {
      if(!t.due||t.done) return false;
      return new Date(t.due+'T00:00:00') < now;
    }
    return true;
  });

  // sort
  const priOrder = {high:0,medium:1,low:2};
  if(sort==='newest')   visible.sort((a,b) => b.created - a.created);
  if(sort==='oldest')   visible.sort((a,b) => a.created - b.created);
  if(sort==='priority') visible.sort((a,b) => priOrder[a.priority] - priOrder[b.priority]);
  if(sort==='due')      visible.sort((a,b) => {
    if(!a.due && !b.due) return 0;
    if(!a.due) return 1; if(!b.due) return -1;
    return new Date(a.due) - new Date(b.due);
  });

  // clear old cards
  grid.querySelectorAll('.task-card').forEach(c => c.remove());

  if(!visible.length) {
    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
    visible.forEach((t, i) => {
      const card = makeCard(t, i);
      grid.appendChild(card);
    });
  }

  updateStats();
  updateIllus();

  // update filter titles
  const titles = {all:'All Tasks',active:'Active Tasks',done:'Completed Tasks',high:'High Priority',overdue:'Overdue Tasks'};
  const subs   = {all:'Showing all your tasks',active:'Tasks still in progress',done:'Tasks you have completed',high:'Critical priority tasks',overdue:'Tasks past their deadline'};
  document.getElementById('content-title').textContent    = titles[filter];
  document.getElementById('content-subtitle').textContent = subs[filter];
}

// ── MAKE CARD ──
function makeCard(t, i) {
  const now = new Date(); now.setHours(0,0,0,0);
  let dueHtml = '';
  if(t.due) {
    const d    = new Date(t.due+'T00:00:00');
    const late = d < now && !t.done;
    const dStr = d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    dueHtml = `<span class="due-tag${late?' late':''}">📅 ${late?'Overdue · ':''}${dStr}</span>`;
  }

  const card = document.createElement('div');
  card.className = `task-card${t.done?' done':''}`;
  card.dataset.id = t.id;
  card.dataset.p  = t.priority;
  card.style.animationDelay = `${i*0.04}s`;

  card.innerHTML = `
    <div class="card-top">
      <div class="task-check" onclick="toggleTask(${t.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="task-title">${esc(t.title)}</div>
      <div class="card-actions">
        <button class="act" onclick="openEdit(${t.id})" title="Edit">✎</button>
        <button class="act del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    </div>
    ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
    <div class="card-footer">
      <span class="pri-tag ${t.priority}">${t.priority}</span>
      ${dueHtml}
    </div>
  `;
  return card;
}

// ── STATS ──
function updateStats() {
  const now   = new Date(); now.setHours(0,0,0,0);
  const total   = tasks.length;
  const done    = tasks.filter(t => t.done).length;
  const active  = total - done;
  const high    = tasks.filter(t => t.priority==='high' && !t.done).length;
  const overdue = tasks.filter(t => t.due && !t.done && new Date(t.due+'T00:00:00') < now).length;

  document.getElementById('stat-total').textContent  = `${total} Total`;
  document.getElementById('stat-active').textContent = `${active} Active`;
  document.getElementById('stat-done').textContent   = `${done} Done`;

  document.getElementById('badge-all').textContent     = total;
  document.getElementById('badge-active').textContent  = active;
  document.getElementById('badge-done').textContent    = done;
  document.getElementById('badge-high').textContent    = high;
  document.getElementById('badge-overdue').textContent = overdue;
}

// ── ILLUSTRATION MESSAGE ──
function updateIllus() {
  const total  = tasks.length;
  const done   = tasks.filter(t => t.done).length;
  const active = total - done;
  const msgs = [
    'Add your first task<br/>and get things done! 🚀',
    `${active} task${active!==1?'s':''} to go —<br/>you got this! 💪`,
    'Great progress!<br/>Keep it up! ⚡',
    'Almost there!<br/>Finish strong! 🔥',
    'All done!<br/>You crushed it! 🎉'
  ];
  const pct = total ? Math.round((done/total)*100) : 0;
  const idx = total===0 ? 0 : pct===100 ? 4 : pct>=70 ? 3 : pct>=30 ? 2 : 1;
  document.getElementById('illus-msg').innerHTML = msgs[idx];
}

// ── TOAST ──
function toast(msg) {
  let el = document.getElementById('toast');
  if(!el) { el=document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window._t);
  window._t = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── HELPERS ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function save() { localStorage.setItem('tma-tasks', JSON.stringify(tasks)); }
</script>
</body>
</html>
