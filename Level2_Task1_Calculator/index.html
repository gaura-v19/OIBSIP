<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloCalc // Quantum Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="calculator" id="calcCard">
        <div class="holo-glare"></div>
        
        <div class="display">
            <div class="history" id="history"></div>
            <div class="current" id="current">0</div>
        </div>
        
        <div class="buttons-grid">
            <button class="btn btn-clear" data-action="clear-all">C</button>
            <button class="btn btn-clear" data-action="clear-entry">CE</button>
            <button class="btn btn-operator" data-action="percent">%</button>
            <button class="btn btn-operator" data-action="divide">/</button>
            
            <button class="btn btn-num" data-val="7">7</button>
            <button class="btn btn-num" data-val="8">8</button>
            <button class="btn btn-num" data-val="9">9</button>
            <button class="btn btn-operator" data-action="multiply">*</button>
            
            <button class="btn btn-num" data-val="4">4</button>
            <button class="btn btn-num" data-val="5">5</button>
            <button class="btn btn-num" data-val="6">6</button>
            <button class="btn btn-operator" data-action="subtract">-</button>
            
            <button class="btn btn-num" data-val="1">1</button>
            <button class="btn btn-num" data-val="2">2</button>
            <button class="btn btn-num" data-val="3">3</button>
            <button class="btn btn-operator" data-action="add">+</button>
            
            <button class="btn btn-num" data-action="toggle-sign">±</button>
            <button class="btn btn-num" data-val="0">0</button>
            <button class="btn btn-num" data-val=".">.</button>
            <button class="btn btn-equals" data-action="calculate">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
