<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthKit — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       AUTH CARD
  ══════════════════════════════════════════════════ -->
  <div class="page" id="authPage">
    <div class="card">

      <!-- MASCOT -->
      <div class="mascot-wrap" id="mascotWrap">
        <div class="mascot" id="mascot">

          <!-- Hands (raised for password) -->
          <div class="hands" id="hands">
            <div class="hand hand-left" id="handLeft">
              <div class="hand-thumb"></div>
            </div>
            <div class="hand hand-right" id="handRight">
              <div class="hand-thumb"></div>
            </div>
          </div>

          <!-- HEAD -->
          <div class="head" id="head">

            <!-- Ear patches -->
            <div class="ear-patch ear-patch-left"></div>
            <div class="ear-patch ear-patch-right"></div>

            <!-- Ears -->
            <div class="ears">
              <div class="ear ear-left">
                <div class="ear-inner"></div>
              </div>
              <div class="ear ear-right">
                <div class="ear-inner"></div>
              </div>
            </div>

            <!-- Eyebrows -->
            <div class="eyebrows">
              <div class="eyebrow eyebrow-left" id="ebLeft"></div>
              <div class="eyebrow eyebrow-right" id="ebRight"></div>
            </div>

            <!-- Eye patches (panda markings) -->
            <div class="eye-patches">
              <div class="eye-patch eye-patch-left"></div>
              <div class="eye-patch eye-patch-right"></div>
            </div>

            <!-- Eyes -->
            <div class="eyes">
              <div class="eye eye-left" id="eyeLeft">
                <div class="eye-inner">
                  <div class="pupil" id="pupilLeft">
                    <div class="pupil-shine"></div>
                  </div>
                </div>
                <div class="eyelid" id="eyelidLeft"></div>
              </div>
              <div class="eye eye-right" id="eyeRight">
                <div class="eye-inner">
                  <div class="pupil" id="pupilRight">
                    <div class="pupil-shine"></div>
                  </div>
                </div>
                <div class="eyelid" id="eyelidRight"></div>
              </div>
            </div>

            <!-- Snout -->
            <div class="snout">
              <div class="nose"></div>
              <!-- Chewing stick -->
              <div class="stick-wrap" id="stickWrap">
                <div class="stick"></div>
                <div class="stick-leaf"></div>
              </div>
              <!-- Mouth -->
              <div class="mouth" id="mouth">
                <div class="mouth-inner" id="mouthInner"></div>
              </div>
            </div>

            <!-- Cheeks -->
            <div class="cheeks">
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
            </div>

          </div><!-- /head -->

          <!-- BODY -->
          <div class="body-wrap" id="bodyWrap">
            <div class="body">
              <div class="body-patch"></div>
              <div class="body-shine"></div>
              <!-- Arms -->
              <div class="arm arm-left"></div>
              <div class="arm arm-right"></div>
            </div>
            <!-- Feet -->
            <div class="feet">
              <div class="foot foot-left"><div class="foot-pad"></div></div>
              <div class="foot foot-right"><div class="foot-pad"></div></div>
            </div>
          </div>

        </div><!-- /mascot -->
      </div><!-- /mascot-wrap -->

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" id="tabLogin" data-target="login">Login</button>
        <button class="tab" id="tabRegister" data-target="register">Register</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- FORMS SLIDER -->
      <div class="forms-slider" id="formsSlider">

        <!-- LOGIN -->
        <div class="form-panel" id="loginPanel">
          <form id="loginForm" novalidate>
            <div class="field-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
              <span class="field-msg" id="loginEmailMsg"></span>
            </div>
            <div class="field-group">
              <label for="loginPassword">Password</label>
              <div class="password-wrap">
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
                <button type="button" class="eye-toggle" id="loginEyeToggle" aria-label="Toggle password">
                  <span class="eye-icon" id="loginEyeIcon"></span>
                </button>
              </div>
              <span class="field-msg" id="loginPasswordMsg"></span>
            </div>
            <span class="form-msg" id="loginFormMsg"></span>
            <button type="submit" class="btn-primary">Login</button>
          </form>
          <p class="switch-text">No account? <button class="link-btn" data-target="register">Register free</button></p>
        </div>

        <!-- REGISTER -->
        <div class="form-panel" id="registerPanel">
          <form id="registerForm" novalidate>
            <div class="field-group">
              <label for="regName">Name</label>
              <input type="text" id="regName" placeholder="Your name" autocomplete="name" />
              <span class="field-msg" id="regNameMsg"></span>
            </div>
            <div class="field-group">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
              <span class="field-msg" id="regEmailMsg"></span>
            </div>
            <div class="field-group">
              <label for="regPassword">Password</label>
              <div class="password-wrap">
                <input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password" />
                <button type="button" class="eye-toggle" id="regEyeToggle" aria-label="Toggle password">
                  <span class="eye-icon" id="regEyeIcon"></span>
                </button>
              </div>
              <span class="field-msg" id="regPasswordMsg"></span>
            </div>
            <span class="form-msg" id="regFormMsg"></span>
            <button type="submit" class="btn-primary">Create Account</button>
          </form>
          <p class="switch-text">Have an account? <button class="link-btn" data-target="login">Login</button></p>
        </div>

      </div><!-- /forms-slider -->
    </div><!-- /card -->
  </div><!-- /authPage -->

  <!-- ═══════════════════════════════════════════════
       WELCOME PAGE
  ══════════════════════════════════════════════════ -->
  <div class="page hidden" id="welcomePage">
    <div class="card welcome-card">
      <!-- Mini panda -->
      <div class="welcome-mascot">
        <div class="mini-panda">
          <div class="mp-head">
            <div class="mp-ear mp-ear-l"><div class="mp-ear-i"></div></div>
            <div class="mp-ear mp-ear-r"><div class="mp-ear-i"></div></div>
            <div class="mp-patch mp-patch-l"></div>
            <div class="mp-patch mp-patch-r"></div>
            <div class="mp-eye mp-eye-l"></div>
            <div class="mp-eye mp-eye-r"></div>
            <div class="mp-snout">
              <div class="mp-nose"></div>
              <div class="mp-mouth"></div>
            </div>
          </div>
          <div class="mp-body"></div>
        </div>
      </div>
      <h1 class="welcome-title">Hey, <span id="welcomeName">Friend</span>! 🎉</h1>
      <p class="welcome-sub">You're securely logged in and good to go.</p>
      <div class="welcome-badge">
        <span class="badge-dot"></span>
        <span>Session Active</span>
      </div>
      <button class="btn-primary btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
