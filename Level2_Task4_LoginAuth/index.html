<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthKit — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       AUTH CARD
  ══════════════════════════════════════════════════ -->
  <div class="page" id="authPage">
    <div class="card">

      <!-- MASCOT -->
      <div class="mascot-wrap" id="mascotWrap">
        <div class="mascot" id="mascot">

          <!-- Hands (behind head) -->
          <div class="hands" id="hands">
            <div class="hand hand-left" id="handLeft"></div>
            <div class="hand hand-right" id="handRight"></div>
          </div>

          <!-- Head -->
          <div class="head" id="head">
            <!-- Eyebrows -->
            <div class="eyebrows" id="eyebrows">
              <div class="eyebrow eyebrow-left" id="ebLeft"></div>
              <div class="eyebrow eyebrow-right" id="ebRight"></div>
            </div>

            <!-- Eyes -->
            <div class="eyes">
              <div class="eye eye-left" id="eyeLeft">
                <div class="eye-inner">
                  <div class="pupil" id="pupilLeft">
                    <div class="pupil-shine"></div>
                  </div>
                </div>
                <div class="eyelid" id="eyelidLeft"></div>
              </div>
              <div class="eye eye-right" id="eyeRight">
                <div class="eye-inner">
                  <div class="pupil" id="pupilRight">
                    <div class="pupil-shine"></div>
                  </div>
                </div>
                <div class="eyelid" id="eyelidRight"></div>
              </div>
            </div>

            <!-- Nose -->
            <div class="nose"></div>

            <!-- Mouth -->
            <div class="mouth" id="mouth">
              <div class="mouth-inner" id="mouthInner"></div>
            </div>

            <!-- Cheeks -->
            <div class="cheeks">
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
            </div>
          </div>

          <!-- Body -->
          <div class="body-wrap" id="bodyWrap">
            <div class="body">
              <div class="body-shine"></div>
            </div>
            <!-- Feet -->
            <div class="feet">
              <div class="foot foot-left"></div>
              <div class="foot foot-right"></div>
            </div>
          </div>

        </div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" id="tabLogin" data-target="login">Login</button>
        <button class="tab" id="tabRegister" data-target="register">Register</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- FORMS SLIDER -->
      <div class="forms-slider" id="formsSlider">

        <!-- LOGIN FORM -->
        <div class="form-panel" id="loginPanel">
          <form id="loginForm" novalidate>
            <div class="field-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" name="email" placeholder="you@example.com" autocomplete="email" />
              <span class="field-msg" id="loginEmailMsg"></span>
            </div>
            <div class="field-group">
              <label for="loginPassword">Password</label>
              <div class="password-wrap">
                <input type="password" id="loginPassword" name="password" placeholder="••••••••" autocomplete="current-password" />
                <button type="button" class="eye-toggle" id="loginEyeToggle" aria-label="Show password">
                  <span class="eye-icon" id="loginEyeIcon"></span>
                </button>
              </div>
              <span class="field-msg" id="loginPasswordMsg"></span>
            </div>
            <span class="form-msg" id="loginFormMsg"></span>
            <button type="submit" class="btn-primary" id="loginBtn">Login</button>
          </form>
          <p class="switch-text">No account? <button class="link-btn" data-target="register">Register</button></p>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-panel" id="registerPanel">
          <form id="registerForm" novalidate>
            <div class="field-group">
              <label for="regName">Name</label>
              <input type="text" id="regName" name="name" placeholder="Your name" autocomplete="name" />
              <span class="field-msg" id="regNameMsg"></span>
            </div>
            <div class="field-group">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" name="email" placeholder="you@example.com" autocomplete="email" />
              <span class="field-msg" id="regEmailMsg"></span>
            </div>
            <div class="field-group">
              <label for="regPassword">Password</label>
              <div class="password-wrap">
                <input type="password" id="regPassword" name="password" placeholder="Min 6 characters" autocomplete="new-password" />
                <button type="button" class="eye-toggle" id="regEyeToggle" aria-label="Show password">
                  <span class="eye-icon" id="regEyeIcon"></span>
                </button>
              </div>
              <span class="field-msg" id="regPasswordMsg"></span>
            </div>
            <span class="form-msg" id="regFormMsg"></span>
            <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
          </form>
          <p class="switch-text">Have an account? <button class="link-btn" data-target="login">Login</button></p>
        </div>

      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       WELCOME PAGE
  ══════════════════════════════════════════════════ -->
  <div class="page hidden" id="welcomePage">
    <div class="card welcome-card">
      <div class="welcome-mascot">
        <div class="mascot-small">
          <div class="sm-head">
            <div class="sm-eyes">
              <div class="sm-eye"></div>
              <div class="sm-eye"></div>
            </div>
            <div class="sm-mouth"></div>
          </div>
          <div class="sm-body"></div>
        </div>
      </div>
      <h1 class="welcome-title">Welcome back, <span id="welcomeName">Friend</span>!</h1>
      <p class="welcome-sub">You are now securely logged in.</p>
      <div class="welcome-badge">
        <span class="badge-dot"></span>
        <span>Authenticated Session Active</span>
      </div>
      <button class="btn-primary btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
