<body>

  <div class="stars" id="stars"></div>

  <div class="side-planet"></div>

  <div class="layout">

    <div class="left-panel">

      <div class="cover-planet"></div>

      <div class="left-content">

        <div class="small-text">
          Space Series
        </div>

        <div class="main-title">
          SPACE <br>
          <span>THERMOMETER</span>
        </div>

        <div class="desc">
          A premium real-time temperature converter inspired by glowing planets and deep space aesthetics.
        </div>

      </div>

      <div class="author">
        <p>Internship Project</p>
        <h3>Gaurav Tripathi</h3>
      </div>

    </div>

    <div class="converter">

      <div class="heading">
        Temperature Converter
      </div>

      <h1>Convert Instantly</h1>

      <input
        type="text"
        id="tempInput"
        placeholder="Enter temperature value"
      >

      <div class="units">

        <button class="unit-btn active" data-unit="C">
          Celsius
        </button>

        <button class="unit-btn" data-unit="F">
          Fahrenheit
        </button>

        <button class="unit-btn" data-unit="K">
          Kelvin
        </button>

      </div>

      <div class="error" id="error"></div>

      <div class="orb-wrap">
        <div class="orb" id="orb"></div>
      </div>

      <div class="results">

        <div class="card">
          <div class="label">Celsius</div>
          <div class="value" id="celsius">-- °C</div>
        </div>

        <div class="card">
          <div class="label">Fahrenheit</div>
          <div class="value" id="fahrenheit">-- °F</div>
        </div>

        <div class="card">
          <div class="label">Kelvin</div>
          <div class="value" id="kelvin">-- K</div>
        </div>

      </div>

    </div>

  </div>

  <script>

    const input = document.getElementById("tempInput");

    const buttons = document.querySelectorAll(".unit-btn");

    const celsiusEl = document.getElementById("celsius");
    const fahrenheitEl = document.getElementById("fahrenheit");
    const kelvinEl = document.getElementById("kelvin");

    const errorEl = document.getElementById("error");

    const orb = document.getElementById("orb");

    let selectedUnit = "C";

    buttons.forEach(btn => {

      btn.addEventListener("click", () => {

        buttons.forEach(b => b.classList.remove("active"));

        btn.classList.add("active");

        selectedUnit = btn.dataset.unit;

        convertTemperature();

      });

    });

    input.addEventListener("input", () => {

      requestAnimationFrame(convertTemperature);

    });

    function convertTemperature(){

      const value = input.value.trim();

      if(value === ""){

        resetValues();

        errorEl.textContent = "";

        updateOrb(20);

        return;
      }

      if(!/^[-+]?\d*\.?\d+$/.test(value)){

        errorEl.textContent = "Please enter numbers only.";

        resetValues();

        return;
      }

      errorEl.textContent = "";

      const temp = parseFloat(value);

      let c,f,k;

      if(selectedUnit === "C"){

        c = temp;
        f = (temp * 9/5) + 32;
        k = temp + 273.15;

      }

      else if(selectedUnit === "F"){

        c = (temp - 32) * 5/9;
        f = temp;
        k = c + 273.15;

      }

      else{

        c = temp - 273.15;
        f = (c * 9/5) + 32;
        k = temp;

      }

      celsiusEl.textContent = `${c.toFixed(2)} °C`;

      fahrenheitEl.textContent = `${f.toFixed(2)} °F`;

      kelvinEl.textContent = `${k.toFixed(2)} K`;

      updateOrb(c);

    }

    function resetValues(){

      celsiusEl.textContent = "-- °C";
      fahrenheitEl.textContent = "-- °F";
      kelvinEl.textContent = "-- K";

    }

    function updateOrb(celsius){

      let gradient = "";
      let glow = "";

      if(celsius < 0){

        gradient =
        "radial-gradient(circle at 30% 30%, #dbeafe, #2563eb)";

        glow =
        `
        0 0 50px rgba(59,130,246,0.55),
        0 0 120px rgba(59,130,246,0.25)
        `;
      }

      else if(celsius <= 30){

        gradient =
        "radial-gradient(circle at 30% 30%, #fff7cc, #f5c518)";

        glow =
        `
        0 0 50px rgba(245,197,24,0.45),
        0 0 120px rgba(245,197,24,0.25)
        `;
      }

      else{

        gradient =
        "radial-gradient(circle at 30% 30%, #ffd1a8, #ff5a1f)";

        glow =
        `
        0 0 50px rgba(255,90,31,0.5),
        0 0 120px rgba(255,90,31,0.25)
        `;
      }

      orb.style.background = gradient;

      orb.style.boxShadow = glow;

    }

    updateOrb(20);

    const stars = document.getElementById("stars");

    for(let i=0;i<120;i++){

      const star = document.createElement("div");

      star.classList.add("star");

      star.style.left = Math.random()*100 + "%";

      star.style.top = Math.random()*100 + "%";

      const size = Math.random()*2 + 1;

      star.style.width = size + "px";
      star.style.height = size + "px";

      star.style.animationDelay = Math.random()*5 + "s";

      stars.appendChild(star);

    }

  </script>

</body>
</html>
