<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #0ea5e9;
    --bg: #080810;
    --card-bg: #0d0d1a;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.45);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.5rem;
    width: 100%;
    max-width: 960px;
    align-items: start;
  }

  /* ── LEFT HALF ── */
  .left { display: flex; flex-direction: column; gap: 1.6rem; }

  h1 {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }
  h1 span { color: var(--accent); transition: color 0.5s; }

  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.1rem;
    color: #fff;
    font-family: inherit;
    font-size: 1.3rem;
    font-weight: 500;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .input-wrap input.error { border-color: #ef4444; }
  .error-msg {
    position: absolute;
    bottom: -1.35rem;
    left: 4px;
    font-size: 0.72rem;
    color: #ef4444;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .error-msg.show { opacity: 1; }

  /* unit toggles */
  .unit-toggles {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.4rem;
  }
  .unit-btn {
    flex: 1;
    padding: 0.55rem 0;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .unit-btn:hover { color: #fff; border-color: rgba(255,255,255,0.15); }
  .unit-btn.active {
    color: #fff;
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 14%, #0d0d1a);
    box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 35%, transparent);
    animation: glowPulse 2s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 30%, transparent); }
    50%      { box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 60%, transparent); }
  }

  /* result cards */
  .cards { display: flex; flex-direction: column; gap: 0.75rem; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: opacity 0.3s, transform 0.3s, border-color 0.5s, box-shadow 0.5s;
    animation: slideIn 0.35s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card.dimmed {
    opacity: 0.28;
    pointer-events: none;
  }
  .card-label {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .card-value {
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
    transition: all 0.3s;
  }
  .card.active-card {
    border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .card-unit {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: 4px;
    font-weight: 500;
  }

  /* ── RIGHT HALF ── */
  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
    padding-top: 0.5rem;
  }

  .beaker-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* pure CSS beaker */
  .beaker {
    position: relative;
    width: 110px;
    height: 320px;
  }

  /* The glass tube body */
  .beaker-body {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 290px;
    border: 2px solid rgba(255,255,255,0.18);
    border-top: none;
    border-radius: 0 0 22px 22px;
    background: rgba(255,255,255,0.03);
    overflow: hidden;
    transition: box-shadow 0.8s ease;
  }

  /* Top opening rim */
  .beaker-top {
    position: absolute;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    background: rgba(255,255,255,0.03);
  }
  /* Spout */
  .beaker-spout {
    position: absolute;
    top: 14px; right: 4px;
    width: 18px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.18);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    background: rgba(255,255,255,0.02);
  }

  /* Liquid inside */
  .liquid {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: var(--accent);
    transition: height 0.8s ease, background-color 0.8s ease, box-shadow 0.8s ease;
    border-radius: 0 0 20px 20px;
    overflow: hidden;
  }

  /* Wave surface */
  .wave {
    position: absolute;
    top: -8px; left: -20%;
    width: 140%;
    height: 18px;
    background: inherit;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    animation: wave 2.4s linear infinite;
  }
  .wave2 {
    position: absolute;
    top: -5px; left: -20%;
    width: 140%;
    height: 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    animation: wave 1.8s linear infinite reverse;
  }
  @keyframes wave {
    0%   { transform: translateX(0); }
    100% { transform: translateX(14%); }
  }

  /* Bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1); opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(-260px) scale(0.5); opacity: 0; }
  }

  /* Glow on beaker */
  .beaker-glow {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 290px;
    border-radius: 0 0 22px 22px;
    pointer-events: none;
    transition: box-shadow 0.8s ease;
  }

  /* Scale markings */
  .scale-marks {
    position: absolute;
    right: -22px;
    bottom: 8px;
    height: 270px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }
  .scale-mark {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .scale-mark::before {
    content: '';
    width: 8px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    display: block;
  }
  .scale-mark span {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }

  /* Temp label below */
  .temp-label {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
    transition: color 0.8s;
    letter-spacing: 0.02em;
  }
  .temp-sublabel {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 2px;
  }

  /* Responsive */
  @media (max-width: 660px) {
    .container {
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }
    .right { padding-top: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- LEFT -->
  <div class="left">
    <h1>Temperature <span id="accentTitle">Converter</span></h1>

    <div>
      <div class="input-wrap">
        <input type="text" id="tempInput" placeholder="Enter temperature…" autocomplete="off" />
        <span class="error-msg" id="errMsg">Only numbers allowed</span>
      </div>
      <div class="unit-toggles" style="margin-top:1.1rem;">
        <button class="unit-btn active" data-unit="C">°C Celsius</button>
        <button class="unit-btn" data-unit="F">°F Fahrenheit</button>
        <button class="unit-btn" data-unit="K">K Kelvin</button>
      </div>
    </div>

    <div class="cards">
      <div class="card" id="card-C">
        <span class="card-label">Celsius</span>
        <span class="card-value" id="val-C">—<span class="card-unit">°C</span></span>
      </div>
      <div class="card" id="card-F">
        <span class="card-label">Fahrenheit</span>
        <span class="card-value" id="val-F">—<span class="card-unit">°F</span></span>
      </div>
      <div class="card" id="card-K">
        <span class="card-label">Kelvin</span>
        <span class="card-value" id="val-K">—<span class="card-unit">K</span></span>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="beaker-wrap">
      <!-- Spout & top -->
      <div class="beaker-spout"></div>
      <div class="beaker-top"></div>

      <div class="beaker" id="beaker">
        <div class="beaker-body" id="beakerBody">
          <div class="liquid" id="liquid">
            <div class="wave"></div>
            <div class="wave2"></div>
            <!-- Bubbles injected by JS -->
          </div>
        </div>
        <div class="beaker-glow" id="beakerGlow"></div>
        <div class="scale-marks">
          <div class="scale-mark"><span>HOT</span></div>
          <div class="scale-mark"><span></span></div>
          <div class="scale-mark"><span></span></div>
          <div class="scale-mark"><span>MID</span></div>
          <div class="scale-mark"><span></span></div>
          <div class="scale-mark"><span></span></div>
          <div class="scale-mark"><span>COLD</span></div>
        </div>
      </div>
    </div>

    <div style="text-align:center;">
      <div class="temp-label" id="tempLabel">— °C</div>
      <div class="temp-sublabel" id="tempDesc">Enter a temperature</div>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('tempInput');
  const errMsg = document.getElementById('errMsg');
  const liquid = document.getElementById('liquid');
  const beakerBody = document.getElementById('beakerBody');
  const beakerGlow = document.getElementById('beakerGlow');
  const tempLabel = document.getElementById('tempLabel');
  const tempDesc = document.getElementById('tempDesc');
  const unitBtns = document.querySelectorAll('.unit-btn');
  const cards = { C: document.getElementById('card-C'), F: document.getElementById('card-F'), K: document.getElementById('card-K') };
  const vals = { C: document.getElementById('val-C'), F: document.getElementById('val-F'), K: document.getElementById('val-K') };

  let activeUnit = 'C';
  let currentCelsius = null;

  // ── Create bubbles ──
  const bubbleData = [
    { size: 5, left: 20, dur: 3.8, delay: 0 },
    { size: 7, left: 50, dur: 5.2, delay: 1.1 },
    { size: 4, left: 70, dur: 4.5, delay: 2.3 },
    { size: 6, left: 35, dur: 6.0, delay: 0.7 },
    { size: 4, left: 60, dur: 3.4, delay: 3.1 },
  ];
  bubbleData.forEach(b => {
    const el = document.createElement('div');
    el.className = 'bubble';
    el.style.cssText = `width:${b.size}px;height:${b.size}px;left:${b.left}%;bottom:5%;animation-duration:${b.dur}s;animation-delay:-${b.delay}s;`;
    liquid.appendChild(el);
  });

  // ── Unit switch ──
  unitBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      unitBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeUnit = btn.dataset.unit;
      updateCards();
      syncInputToUnit();
    });
  });

  function syncInputToUnit() {
    if (currentCelsius === null) return;
    const v = fromCelsius(currentCelsius, activeUnit);
    input.value = fmt(v);
  }

  // ── Input handling ──
  input.addEventListener('input', () => {
    const raw = input.value.trim();
    if (raw === '' || raw === '-') {
      errMsg.classList.remove('show');
      input.classList.remove('error');
      currentCelsius = null;
      resetDisplay();
      return;
    }
    if (!/^-?\d*\.?\d*$/.test(raw)) {
      errMsg.classList.add('show');
      input.classList.add('error');
      return;
    }
    errMsg.classList.remove('show');
    input.classList.remove('error');
    const num = parseFloat(raw);
    if (isNaN(num)) return;
    currentCelsius = toCelsius(num, activeUnit);
    updateAll();
  });

  // ── Conversions ──
  function toCelsius(v, unit) {
    if (unit === 'C') return v;
    if (unit === 'F') return (v - 32) * 5/9;
    if (unit === 'K') return v - 273.15;
  }
  function fromCelsius(c, unit) {
    if (unit === 'C') return c;
    if (unit === 'F') return c * 9/5 + 32;
    if (unit === 'K') return c + 273.15;
  }
  function fmt(n) { return Number.isInteger(n) ? n.toString() : n.toFixed(2); }

  // ── Color logic ──
  function getColor(c) {
    if (c < 0)   return '#0ea5e9';
    if (c < 15)  return '#06b6d4';
    if (c < 30)  return '#f5c518';
    if (c < 45)  return '#f97316';
    return '#ef4444';
  }
  function getDesc(c) {
    if (c < 0)   return 'Freezing cold ❄️';
    if (c < 15)  return 'Cool & crisp 🌊';
    if (c < 30)  return 'Warm & pleasant ☀️';
    if (c < 45)  return 'Hot 🔥';
    return 'Extreme heat 🌋';
  }

  // ── Fill level: map Celsius to 5%–95% ──
  function getFill(c) {
    const min = -50, max = 120;
    const clamped = Math.max(min, Math.min(max, c));
    return 5 + ((clamped - min) / (max - min)) * 90;
  }

  function updateAll() {
    const c = currentCelsius;
    const color = getColor(c);

    // CSS var update
    document.documentElement.style.setProperty('--accent', color);

    // Liquid
    liquid.style.height = getFill(c) + '%';
    liquid.style.backgroundColor = color;
    liquid.style.boxShadow = `0 0 18px ${color}88`;

    // Beaker glow
    beakerBody.style.boxShadow = `0 0 28px ${color}50, inset 0 0 12px ${color}22`;

    // Label
    const cVal = fromCelsius(c, 'C');
    tempLabel.textContent = fmt(cVal) + ' °C';
    tempLabel.style.color = color;
    tempDesc.textContent = getDesc(c);

    updateCards();
  }

  function updateCards() {
    const c = currentCelsius;
    ['C','F','K'].forEach(u => {
      const card = cards[u];
      const valEl = vals[u];
      const unitSpan = valEl.querySelector('.card-unit');

      card.classList.toggle('dimmed', u === activeUnit);
      card.classList.toggle('active-card', u !== activeUnit && c !== null);

      if (c !== null) {
        const v = fromCelsius(c, u);
        const unitStr = u === 'C' ? '°C' : u === 'F' ? '°F' : 'K';
        // Animate change
        valEl.style.opacity = '0';
        valEl.style.transform = 'translateY(-4px)';
        setTimeout(() => {
          valEl.childNodes[0].textContent = fmt(v);
          if (!unitSpan) {
            const s = document.createElement('span');
            s.className = 'card-unit';
            s.textContent = unitStr;
            valEl.appendChild(s);
          } else {
            unitSpan.textContent = unitStr;
          }
          valEl.style.opacity = '1';
          valEl.style.transform = 'translateY(0)';
          valEl.style.transition = 'opacity 0.25s, transform 0.25s';
        }, 80);
      } else {
        valEl.childNodes[0].textContent = '—';
      }
    });
  }

  function resetDisplay() {
    ['C','F','K'].forEach(u => {
      cards[u].classList.remove('dimmed','active-card');
      vals[u].childNodes[0].textContent = '—';
    });
    cards[activeUnit].classList.add('dimmed');
    liquid.style.height = '30%';
    liquid.style.backgroundColor = '#0ea5e9';
    liquid.style.boxShadow = '';
    beakerBody.style.boxShadow = '';
    document.documentElement.style.setProperty('--accent', '#0ea5e9');
    tempLabel.textContent = '— °C';
    tempLabel.style.color = '#0ea5e9';
    tempDesc.textContent = 'Enter a temperature';
  }

  // Init state
  cards[activeUnit].classList.add('dimmed');
</script>
</body>
</html>
